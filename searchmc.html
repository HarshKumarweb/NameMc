<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Player Lookup</title>

<style>

/* layout */

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0d1117;
color:#e6edf3;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* header */

header{
padding:30px 20px;
text-align:center;
border-bottom:1px solid #1f2937;
}

header h1{
font-size:28px;
font-weight:600;
color:#c9d1d9;
}

header p{
margin-top:8px;
color:#8b949e;
font-size:14px;
}

/* search */

.search{
padding:40px 20px;
text-align:center;
}

.search-box{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.search input{
padding:12px 14px;
border-radius:6px;
border:1px solid #30363d;
background:#161b22;
color:white;
width:260px;
}

.search button{
padding:12px 20px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

.search button:hover{
background:#1d4ed8;
}

/* results */

.result{
flex:1;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
}

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:10px;
padding:25px;
max-width:350px;
width:100%;
text-align:center;
}

.card h2{
margin-bottom:10px;
font-weight:600;
}

.card p{
margin:5px 0;
color:#9ca3af;
}

.card img{
margin-top:10px;
max-width:100%;
}

/* footer */

footer{
border-top:1px solid #30363d;
padding:18px;
text-align:center;
font-size:14px;
color:#8b949e;
}

/* mobile */

@media (max-width:600px){

header h1{
font-size:22px;
}

.search input{
width:200px;
}

}

</style>

</head>


<body>

<header>

<h1>Minecraft Player Search</h1>
<p>Search username → UUID → avatar & skin</p>

</header>


<div class="search">

<div class="search-box">

<input id="username" placeholder="Enter Minecraft username">

<button onclick="searchPlayer()">Search</button>

</div>

</div>


<div id="result" class="result"></div>


<footer>

<p>© Minecraft Player Lookup</p>
<p>Not affiliated with Mojang</p>

</footer>


<script>

async function searchPlayer(){

let username=document.getElementById("username").value.trim();
let result=document.getElementById("result");

if(username===""){
result.innerHTML="Enter a username.";
return;
}

result.innerHTML="Searching...";

try{

/* UUID lookup */

let res=await fetch("https://api.minetools.eu/uuid/"+username);
let data=await res.json();

if(!data.id){
throw "notfound";
}

let uuid=data.id;

/* modern skin renders */

let avatar="https://mc-heads.net/avatar/"+uuid+"/150";
let skin="https://mc-heads.net/body/"+uuid+"/300";

result.innerHTML=`

<div class="card">

<h2>${username}</h2>

<p><b>UUID</b></p>
<p>${uuid}</p>

<h3>Avatar</h3>
<img src="${avatar}">

<h3>Skin</h3>
<img src="${skin}">

</div>

`;

}

catch{

result.innerHTML="Player not found.";

}

}

</script>


</body>
</html>
