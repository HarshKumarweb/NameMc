<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minecraft Player Lookup</title>

<style>

body{
margin:0;
font-family:Arial;
background:#070707;
color:white;
text-align:center;
}

header{
background:black;
padding:25px;
border-bottom:2px solid #00aaff;
box-shadow:0 0 15px #00aaff;
}

h1{
color:#00aaff;
text-shadow:0 0 12px #00aaff;
margin:0;
}

.search{
margin-top:50px;
}

input{
padding:12px;
width:260px;
background:black;
border:2px solid #00aaff;
color:white;
outline:none;
}

button{
padding:12px 20px;
background:#00aaff;
border:none;
font-weight:bold;
cursor:pointer;
margin-left:10px;
}

button:hover{
box-shadow:0 0 15px #00aaff;
}

.result{
margin-top:40px;
}

.card{
display:inline-block;
background:black;
border:1px solid #00aaff;
padding:25px;
box-shadow:0 0 20px #00aaff;
}

.card img{
margin-top:10px;
}

footer{
margin-top:60px;
padding:20px;
border-top:2px solid #00aaff;
color:#00aaff;
}

a{
color:#00aaff;
}

</style>

</head>

<body>

<header>

<h1>Minecraft Player Search</h1>
<p>Search username → UUID → skin</p>

</header>

<div class="search">

<input id="username" placeholder="Enter Minecraft username">

<button onclick="searchPlayer()">Search</button>

</div>

<div id="result" class="result"></div>

<footer>
<p>Not affiliated with Mojang</p>
</footer>

<script>

async function searchPlayer(){

let username=document.getElementById("username").value.trim();
let result=document.getElementById("result");

if(username===""){
result.innerHTML="Enter username.";
return;
}

result.innerHTML="Searching...";

try{

let response=await fetch(
"https://api.minetools.eu/uuid/"+username
);

let data=await response.json();

if(!data.id){
throw "notfound";
}

let uuid=data.id;

/* skin render */

let avatar="https://crafatar.com/avatars/"+uuid+"?size=150";
let skin="https://crafatar.com/renders/body/"+uuid+"?size=300";

result.innerHTML=`

<div class="card">

<h2>${username}</h2>

<p><b>UUID:</b> ${uuid}</p>

<h3>Avatar</h3>
<img src="${avatar}">

<h3>3D Skin</h3>
<img src="${skin}">

<p><a href="${avatar}" target="_blank">Open Avatar</a></p>
<p><a href="${skin}" target="_blank">Open Skin</a></p>

</div>

`;

}

catch{

result.innerHTML="❌ Player not found.";

}

}

</script>

</body>

</html>
